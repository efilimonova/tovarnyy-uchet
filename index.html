<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Товарный учёт</title>
  <style>
    /* ================================
       БАЗОВЫЕ СТИЛИ
    ================================ */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 
                   'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* ================================
       ШАПКА
    ================================ */
    .header {
      background: #1a73e8;
      color: white;
      padding: 16px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .header p {
      font-size: 13px;
      opacity: 0.85;
      margin-top: 2px;
    }

    /* ================================
       НАВИГАЦИЯ ПО ФОРМАМ
    ================================ */
    .nav-tabs {
      display: flex;
      background: white;
      border-bottom: 2px solid #e0e0e0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .nav-tab {
      flex: 1;
      min-width: 100px;
      padding: 14px 8px;
      text-align: center;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: #666;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .nav-tab:hover {
      background: #f5f5f5;
      color: #1a73e8;
    }

    .nav-tab.active {
      color: #1a73e8;
      border-bottom-color: #1a73e8;
      background: #e8f0fe;
    }

    .nav-tab .tab-icon {
      display: block;
      font-size: 20px;
      margin-bottom: 4px;
    }

    /* ================================
       КОНТЕЙНЕР ФОРМ
    ================================ */
    .forms-container {
      max-width: 700px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .form-section {
      display: none;
    }

    .form-section.active {
      display: block;
    }

    /* ================================
       КАРТОЧКА ФОРМЫ
    ================================ */
    .form-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .form-card-title {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-card-title .icon {
      font-size: 18px;
    }

    /* ================================
       ПОЛЯ ФОРМЫ
    ================================ */
    .field-group {
      margin-bottom: 16px;
    }

    .field-group:last-child {
      margin-bottom: 0;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #444;
      margin-bottom: 6px;
    }

    label .required {
      color: #e53935;
      margin-left: 2px;
    }

    label .hint {
      font-weight: 400;
      color: #888;
      font-size: 12px;
      display: block;
      margin-top: 2px;
    }

    input[type="text"],
    input[type="number"],
    input[type="date"],
    select,
    textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a1a;
      background: #fafafa;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #1a73e8;
      box-shadow: 0 0 0 3px rgba(26,115,232,0.15);
      background: white;
    }

    input.error,
    select.error,
    textarea.error {
      border-color: #e53935;
      box-shadow: 0 0 0 3px rgba(229,57,53,0.1);
    }

    .error-message {
      color: #e53935;
      font-size: 12px;
      margin-top: 4px;
      display: none;
    }

    .error-message.visible {
      display: block;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    /* ================================
       ДВУХКОЛОНОЧНЫЙ МАКЕТ
    ================================ */
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field-row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    @media (max-width: 480px) {
      .field-row,
      .field-row-3 {
        grid-template-columns: 1fr;
      }
    }

    /* ================================
       ПОЗИЦИИ ТОВАРА
    ================================ */
    .positions-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .position-item {
      border: 1.5px solid #e8eaf6;
      border-radius: 10px;
      padding: 14px;
      background: #f8f9ff;
      position: relative;
    }

    .position-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .position-number {
      font-size: 13px;
      font-weight: 600;
      color: #1a73e8;
    }

    .btn-remove-position {
      background: none;
      border: none;
      color: #e53935;
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      border-radius: 4px;
      line-height: 1;
    }

    .btn-remove-position:hover {
      background: #fce4e4;
    }

    .btn-add-position {
      width: 100%;
      padding: 11px;
      border: 2px dashed #1a73e8;
      border-radius: 8px;
      background: transparent;
      color: #1a73e8;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-add-position:hover {
      background: #e8f0fe;
    }

    /* ================================
       ПРЕДУПРЕЖДЕНИЯ
    ================================ */
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .alert-warning {
      background: #fff8e1;
      border: 1px solid #ffcc02;
      color: #795548;
    }

    .alert-danger {
      background: #fce4e4;
      border: 1px solid #ef9a9a;
      color: #c62828;
    }

    .alert-info {
      background: #e3f2fd;
      border: 1px solid #90caf9;
      color: #1565c0;
    }

    .alert-icon {
      font-size: 18px;
      flex-shrink: 0;
    }

    .alert.hidden {
      display: none;
    }

    /* ================================
       КНОПКА ОТПРАВКИ
    ================================ */
    .btn-submit {
      width: 100%;
      padding: 16px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-submit:hover {
      background: #1557b0;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(26,115,232,0.3);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .btn-submit:disabled {
      background: #b0bec5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-submit.loading::after {
      content: '';
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ================================
       СООБЩЕНИЕ ОБ УСПЕХЕ
    ================================ */
    .success-screen {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }

    .success-screen.visible {
      display: block;
    }

    .success-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .success-title {
      font-size: 22px;
      font-weight: 700;
      color: #2e7d32;
      margin-bottom: 8px;
    }

    .success-subtitle {
      font-size: 15px;
      color: #666;
      margin-bottom: 24px;
      line-height: 1.5;
